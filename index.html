<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance System</title>
<link rel="stylesheet" href="login.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="wrapper">

    <div class="card">

        <h1 class="title">Attendance System</h1>
        <p class="subtitle" style="font-size: 20px; color: rgba(255, 255, 255, 0.507);">Sign in to continue</p>

        <p id="error-msg" style="color:#ff6b6b; text-align:center; font-size:13px; margin-bottom:10px; display:none;"></p>

        <form class="form" onsubmit="handleLogin(event)">

            <input type="email" id="email" placeholder="Email" required>

            <input type="password" id="password" placeholder="Password" required>

            <button class="login-btn" type="submit" id="login-btn">Sign In</button>

        </form>

        <p class="signup-text">
            Don't have an account?
            <a href="signup.html">Sign up here</a>
        </p>

    </div>

</div>

<script>
    const { createClient } = supabase;
    const db = createClient(
        'https://cvmfvndfmzmhywttaujy.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2bWZ2bmRmbXptaHl3dHRhdWp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMjgwOTQsImV4cCI6MjA4ODcwNDA5NH0.1mzfGgPWNPRyb1pwra2KTrayCzAqhyn7p5CGEb4UItE'
    );

    function showError(msg) {
        const el = document.getElementById('error-msg');
        el.textContent = msg;
        el.style.display = 'block';
    }

    async function handleLogin(e) {
        e.preventDefault();
        const email    = document.getElementById('email').value
        const password = document.getElementById('password').value;
        const btn      = document.getElementById('login-btn');

        btn.textContent = 'Checking in...';

        const { data, error } = await db.from('users').select('*').eq('email', email).eq('password', password).maybeSingle();
        console.log(data, error);
        if (error || !data) {
            showError('Incorrect email or password.');
            btn.textContent = 'Sign In';
            btn.disabled = false;
            return;
        }

        // Save user to sessionStorage so other pages can access it
        sessionStorage.setItem('user', JSON.stringify(data));

        // Redirect based on role
        if (data.role === 'teacher') {
            window.location.href = 'teacherSection.html';
        } else {
            window.location.href = 'studentSection.html';
        }
    }
</script>

</body>
</html>
