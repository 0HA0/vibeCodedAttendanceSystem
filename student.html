<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>
<link rel="stylesheet" href="student.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="wrapper">

    <header class="topbar">
        <h1>Your Attendance Here</h1>
        <a class="back-link" href="index.html"><button class="logout">Logout</button></a>
    </header>

    <main class="container">

        <div class="card">
            <a class="back-link" href="studentSection.html"><button class="back-btn">← Back</button></a>

            <!-- Attendance Request Banner -->
            <div class="attendance-request-container" id="attendanceRequestContainer" style="display:none;">
                <h3>📋 New Attendance Request</h3>
                <div id="requestList"></div>
            </div>

            <h2 class="welcome" id="welcomeMsg">Welcome, Student</h2>
            <p class="subtitle" id="subjectLabel">Subject: —</p>

            <div class="table-section">
                <h3>Your Attendance History</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Date</th>
                            <th>Time In</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr><td colspan="4" style="text-align:center; color:#aaa;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>

        </div>

    </main>

</div>

<script>
    // ── Supabase ──
    const { createClient } = supabase;
    const db = createClient(
        'https://cvmfvndfmzmhywttaujy.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2bWZ2bmRmbXptaHl3dHRhdWp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMjgwOTQsImV4cCI6MjA4ODcwNDA5NH0.1mzfGgPWNPRyb1pwra2KTrayCzAqhyn7p5CGEb4UItE'
    );

    // ── Session ──
    const user    = JSON.parse(sessionStorage.getItem('user'));
    const subject = JSON.parse(sessionStorage.getItem('subject'));
    if (!user || !subject) window.location.href = 'index.html';

    document.getElementById('welcomeMsg').textContent  = 'Welcome, ' + user.name;
    document.getElementById('subjectLabel').textContent = 'Subject: ' + subject.name;

    // ── Format helpers ──
    function getPHTime() {
        return new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Manila' }));
    }

    function formatDate(d) {
        return new Date(d).toLocaleDateString('en-PH', { month: 'long', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
    }

    function formatTime(t) {
        if (!t) return '—';
        const [h, m] = t.split(':');
        const hr = parseInt(h);
        return `${hr % 12 || 12}:${m} ${hr >= 12 ? 'PM' : 'AM'}`;
    }

    // ── Load attendance history ──
    async function loadHistory() {
        const { data, error } = await db
            .from('attendance')
            .select('*')
            .eq('student_id', user.id)
            .eq('subject_id', subject.id)
            .order('created_at', { ascending: false });

        const tbody = document.getElementById('historyBody');

        if (error || !data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#aaa;">No attendance records yet.</td></tr>';
            return;
        }

        tbody.innerHTML = data.map(r => `
            <tr>
                <td>${r.student_name || user.name}</td>
                <td>${formatDate(r.date)}</td>
                <td>${formatTime(r.time_in)}</td>
                <td class="${r.status.toLowerCase()}">${r.status}</td>
            </tr>
        `).join('');
    }

    // ── Check for active attendance request ──
    async function checkRequest() {
        const { data: request } = await db
            .from('attendance_requests')
            .select('*')
            .eq('subject_id', subject.id)
            .eq('is_open', true)
            .order('created_at', { ascending: false })
            .limit(1)
            .maybeSingle();

        const container  = document.getElementById('attendanceRequestContainer');
        const requestList = document.getElementById('requestList');

        // No open request
        if (!request) { container.style.display = 'none'; return; }

        // Request expired
        const expires = new Date(request.expires_at);
        if (new Date() > expires) { container.style.display = 'none'; return; }

        // Already marked attendance for this request?
        const { data: already } = await db
            .from('attendance')
            .select('id, status')
            .eq('student_id', user.id)
            .eq('request_id', request.id)
            .maybeSingle();

        container.style.display = 'block';

        // Calculate time left
        const minsLeft = Math.round((expires - new Date()) / 60000);

        if (already) {
            requestList.innerHTML = `
                <div class="request-card">
                    <span>You already marked attendance — Status: <strong>${already.status}</strong></span>
                </div>
            `;
        } else {
            requestList.innerHTML = `
                <div class="request-card">
                    <span>Your teacher is taking attendance! ⏰ ${minsLeft} min left</span>
                    <button id="markBtn" onclick="markAttendance('${request.id}', '${request.date}')">Mark Attendance</button>
                </div>
            `;
        }
    }

    // ── Mark attendance ──
    async function markAttendance(requestId, date) {
        const btn = document.getElementById('markBtn');
        btn.textContent = 'Marking...';
        btn.disabled    = true;

        const ph     = getPHTime();
        const time   = ph.toTimeString().split(' ')[0]; // HH:MM:SS

        const { error } = await db.from('attendance').insert({
            student_id:   user.id,
            subject_id:   subject.id,
            request_id:   requestId,
            student_name: user.name,   // saves registered name — no cheating!
            date,
            time_in: time,
            status: 'Pending'
        });

        if (error) {
            alert('Failed to mark: ' + error.message);
            btn.textContent = 'Mark Attendance';
            btn.disabled    = false;
            return;
        }

        // Refresh both
        checkRequest();
        loadHistory();
    }

    // ── Auto refresh every 15 seconds to catch new requests ──
    checkRequest();
    loadHistory();
    setInterval(() => { checkRequest(); loadHistory(); }, 15000);
</script>

</body>
</html>
